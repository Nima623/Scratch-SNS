<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Kosugi Maru', sans-serif; background:#f7f7f7; }
.topbar { background:#ffab19; padding:10px; display:flex; justify-content:space-between; }
button { cursor:pointer; padding:6px 10px; font-size:14px; }

#loginBox {
  display:none; position:absolute; top:60px; right:10px;
  background:white; padding:15px; border-radius:10px;
  width:180px; display:flex; flex-direction:column; gap:8px;
}

#adminPanel {
  display:none; position:fixed; top:100px; left:50%;
  transform:translateX(-50%);
  background:white; padding:15px; border-radius:10px; width:300px;
}

.container { max-width:600px; margin:20px auto; }
textarea { width:100%; height:100px; }

.comment {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  white-space: pre-wrap;
}

.time { font-size:12px; color:gray; }

#toast {
  position:fixed; top:100px; left:50%;
  transform:translateX(-50%);
  background:black; color:white; padding:10px;
  border-radius:8px; opacity:0; transition:0.5s;
}

/* ⭐ BAN画面 */
.banScreen{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  text-align:center;
  z-index:9999;
}
</style>
</head>

<body>

<div class="topbar">
  <b>雑談所</b>
  <div>
    <span id="userText"></span>
    <button id="loginBtn" onclick="toggleLogin()">サインイン/登録</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">ログアウト</button>
    <button id="adminBtn" onclick="openAdmin()" style="display:none;">管理者メニュー</button>
  </div>
</div>

<div id="loginBox">
  <input id="username" placeholder="ユーザー名">
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="login()">OK</button>
</div>

<div id="adminPanel">
  <b>管理者メニュー</b>
  <div id="userList"></div>
</div>

<div class="container">
<textarea id="msg" maxlength="150"></textarea><br>
<button onclick="post()">送信</button>
<div id="posts"></div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, deleteDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* Firebase */
const app = initializeApp({ projectId:"scratch-sns" });
const db = getFirestore(app);

let currentUser = localStorage.getItem("username");
const adminUser = "Hiromu0623";

/* ⭐ 禁止ワード */
const badWords = ["死ね","バカ","きも","うざ"];

/* ⭐ ログ */
let warnLog = JSON.parse(localStorage.getItem("warnLog")||"[]");
let banLevel = parseInt(localStorage.getItem("banLevel")||"0");

/* ⭐ BAN管理 */
let bannedUsers = [];
onSnapshot(collection(db,"bans"), snap=>{
  bannedUsers = snap.docs.map(d=>({id:d.id,...d.data()}));
  checkMyBan();
});

function isBanned(name){
  return bannedUsers.some(b=>b.username===name);
}

/* ⭐ BAN画面 */
function showBanScreen(text){
  document.body.innerHTML = `<div class="banScreen">${text}</div>`;
}

/* ⭐ BANチェック */
function checkMyBan(){
  if(!currentUser) return;

  const b = bannedUsers.find(b=>b.username===currentUser);
  if(!b) return;

  if(!b.until){
    showBanScreen("あなたは管理者によってバンされました。");
    return;
  }

  const remain = Math.max(0, Math.floor((b.until - Date.now())/60000));
  if(remain > 0){
    showBanScreen(`あなたはバンされています。残り ${remain} 分`);
  }
}

/* UI */
function updateUI(){
  userText.textContent=currentUser||"";
  loginBtn.style.display=currentUser?"none":"inline";
  logoutBtn.style.display=currentUser?"inline":"none";
  adminBtn.style.display=currentUser===adminUser?"inline":"none";
  loginBox.style.display="none";
}
updateUI();

window.toggleLogin=()=>loginBox.style.display=loginBox.style.display==="none"?"block":"none";

function toastMsg(msg){
  toast.textContent=msg;
  toast.style.opacity=1;
  setTimeout(()=>toast.style.opacity=0,1500);
}

/* ハッシュ */
async function hash(pass){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pass));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

/* システム投稿 */
async function systemPost(text){
  await addDoc(collection(db,"posts"),{
    name:"[システム]",
    message:text,
    time:Date.now(),
    likes:[]
  });
}

/* ログイン */
window.login=async ()=>{
  const name=username.value;
  const pass=password.value;

  if(!name || !pass){
    toastMsg("入力してください");
    return;
  }

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    const hashed = await hash(pass);
    await addDoc(collection(db,"users"),{username:name,password:hashed});
    toastMsg("登録しました");
    await systemPost(name+" が参加しました");
    currentUser=name;
  }else{
    let ok=false;

    for(const d of snap.docs){
      if(d.data().password === await hash(pass)){
        ok=true;
      }
    }

    if(!ok){
      toastMsg("パスワードが違います");
      return;
    }

    toastMsg("ログインしました");
    currentUser=name;
  }

  localStorage.setItem("username",name);
  updateUI();
  checkMyBan();
};

window.logout=()=>{
  localStorage.clear();
  currentUser=null;
  updateUI();
};

/* 投稿 */
window.post=async ()=>{
  if(!currentUser) return toastMsg("ログインしてください");
  if(isBanned(currentUser)) return;

  /* ⭐ 禁止ワードチェック */
  const now = Date.now();
  warnLog = warnLog.filter(t=> now - t < 3600000);

  if(badWords.some(w=>msg.value.includes(w))){
    warnLog.push(now);
  }

  if(warnLog.length >= 10){
    banLevel++;
    let duration = [15,60,1440][banLevel-1];
    let text = ["15分","1時間","1日"][banLevel-1] || "永久";

    let until = duration ? Date.now()+duration*60000 : null;

    await addDoc(collection(db,"bans"),{username:currentUser,until});

    await systemPost(currentUser+"さんが"+text+"バンされました。");

    showBanScreen("あなたは不快な発言によりバンされました");

    warnLog=[]; 
    localStorage.setItem("warnLog","[]");
    return;
  }

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:msg.value,
    time:Date.now(),
    likes:[]
  });

  msg.value="";
};

/* いいね */
window.like=async(id,btn)=>{
  if(!currentUser) return;

  const ref=doc(db,"posts",id);
  const snap=await getDoc(ref);

  let likes=snap.data().likes||[];

  if(likes.includes(currentUser)){
    likes=likes.filter(u=>u!==currentUser);
  }else{
    likes.push(currentUser);
  }

  await updateDoc(ref,{likes});
};

/* 管理者 */
window.openAdmin=async ()=>{
  adminPanel.style.display=adminPanel.style.display==="none"?"block":"none";
  userList.innerHTML="";

  const snap=await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const name=d.data().username;

    const div=document.createElement("div");

    const banBtn=document.createElement("button");
    banBtn.textContent="BAN";
    banBtn.onclick=async ()=>{
      await addDoc(collection(db,"bans"),{username:name});
      await systemPost(name+" がバンされました");
    };

    div.textContent=name+" ";
    div.appendChild(banBtn);
    userList.appendChild(div);
  });
};

/* 表示 */
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  posts.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    if(isBanned(data.name) && data.name !== "[システム]") return;

    const div=document.createElement("div");
    div.className="comment";

    const name=document.createElement("b");
    name.textContent=data.name;

    const msgEl=document.createElement("div");
    msgEl.textContent=data.message;

    div.appendChild(name);
    div.appendChild(msgEl);

    if(data.name !== "[システム]"){
      const likeText=document.createElement("span");
      likeText.textContent="👍 "+(data.likes?.length||0);

      const likeBtn=document.createElement("button");
      likeBtn.textContent="いいね";
      likeBtn.onclick=()=>like(d.id,likeBtn);

      div.appendChild(likeText);
      div.appendChild(likeBtn);
    }

    posts.appendChild(div);
  });
});
</script>

</body>
</html>
