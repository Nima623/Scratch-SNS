<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Kosugi Maru', sans-serif; background:#f7f7f7; }
.topbar { background:#ffab19; padding:10px; display:flex; justify-content:space-between; align-items:center; }
button { cursor:pointer; }

#loginBox {
  display:none; position:absolute; top:60px; right:10px;
  background:white; padding:15px; border-radius:10px;
  width:180px; display:flex; flex-direction:column; gap:8px;
}
#loginBox input { width:100%; padding:6px; }

#adminPanel {
  display:none; position:fixed; top:100px; left:50%;
  transform:translateX(-50%);
  background:white; padding:15px; border-radius:10px; width:300px;
}

.container { max-width:600px; margin:20px auto; }
textarea { width:100%; height:100px; }

.comment {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  white-space: pre-wrap;
}

.time { font-size:12px; color:gray; }

#toast {
  position:fixed; top:100px; left:50%;
  transform:translateX(-50%);
  background:black; color:white; padding:10px;
  border-radius:8px; opacity:0; transition:0.5s;
}
</style>
</head>

<body>

<div class="topbar">
  <b>雑談所</b>
  <div>
    <span id="userText"></span>
    <button id="loginBtn" onclick="toggleLogin()">サインイン/登録</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">ログアウト</button>
    <button id="adminBtn" onclick="openAdmin()" style="display:none;">管理者パネル</button>
  </div>
</div>

<div id="loginBox">
  <input id="username" placeholder="ユーザー名">
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="login()">OK</button>
</div>

<div id="adminPanel">
  <b>管理者パネル</b>
  <div id="userList"></div>
</div>

<div class="container">
<textarea id="msg" maxlength="150" placeholder="メッセージを入力"></textarea><br>
<button onclick="post()">送信</button>
<div id="posts"></div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, deleteDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCAX28P2QGaNNp6xytLsE9hhcVher9TgPY",
  authDomain: "scratch-sns.firebaseapp.com",
  projectId: "scratch-sns",
  storageBucket: "scratch-sns.firebasestorage.app",
  messagingSenderId: "414045447005",
  appId: "1:414045447005:web:f4710d0a90a43745fcbeb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = localStorage.getItem("username");
const adminUser = "Hiromu0623";

/* 🔐 パスワードハッシュ */
async function hash(pass){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pass));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

/* BAN */
let bannedUsers = [];
onSnapshot(collection(db,"bans"), snap=>{
  bannedUsers = snap.docs.map(d=>d.data().username);
});
function isBanned(name){
  return bannedUsers.includes(name);
}

/* システム投稿 */
async function systemPost(text){
  await addDoc(collection(db,"posts"),{
    name:"[システム]",
    message:text,
    time:Date.now(),
    likes:[]
  });
}

function updateUI(){
  userText.textContent = currentUser || "";
  loginBtn.style.display = currentUser ? "none" : "inline";
  logoutBtn.style.display = currentUser ? "inline" : "none";
  adminBtn.style.display = currentUser===adminUser ? "inline" : "none";
  loginBox.style.display = "none";
}
updateUI();

window.toggleLogin = ()=>{
  loginBox.style.display = loginBox.style.display==="none"?"block":"none";
};

function toastMsg(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1500);
}

/* ログイン（ハッシュ対応） */
window.login = async ()=>{
  const name=username.value;
  const pass=password.value;

  if(!name || !pass){
    toastMsg("入力してください");
    return;
  }

  if(isBanned(name)){
    toastMsg("BANされています");
    return;
  }

  const hashed = await hash(pass);

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"users"),{username:name,password:hashed});
    toastMsg("登録しました");
    await systemPost(name+" が参加しました");
    currentUser=name;
  }else{
    let ok=false;
    snap.forEach(d=>{
      if(d.data().password===hashed) ok=true;
    });

    if(!ok){
      toastMsg("パスワードが違います");
      return;
    }

    toastMsg("ログインしました");
    currentUser=name;
  }

  localStorage.setItem("username",name);
  updateUI();
};

window.logout = ()=>{
  localStorage.removeItem("username");
  currentUser=null;
  updateUI();
  toastMsg("ログアウトしました");
};

/* 投稿 */
window.post = async ()=>{
  if(!currentUser) return toastMsg("サインインしてください");
  if(isBanned(currentUser)) return toastMsg("BANされています");
  if(!msg.value) return;

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:msg.value,
    time:Date.now(),
    likes:[]
  });

  msg.value="";
  toastMsg("投稿しました");
};

function formatTime(t){
  return new Date(t).toLocaleString();
}

/* いいね */
window.like = async(id)=>{
  const ref=doc(db,"posts",id);
  const snap=await getDoc(ref);

  let likes=snap.data().likes||[];
  if(likes.includes(currentUser)){
    likes=likes.filter(u=>u!==currentUser);
  }else{
    likes.push(currentUser);
  }

  await updateDoc(ref,{likes});
};

/* 削除 */
window.del = async(id)=>{
  await deleteDoc(doc(db,"posts",id));
};

/* 管理者 */
window.openAdmin = async ()=>{
  adminPanel.style.display = adminPanel.style.display==="none"?"block":"none";
  userList.innerHTML="";

  const snap=await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const name=d.data().username;

    const div = document.createElement("div");
    const nameText = document.createTextNode(name);

    const btn = document.createElement("button");
    btn.textContent = "BAN";
    btn.onclick = async ()=>{
      await addDoc(collection(db,"bans"),{username:name});
      toastMsg(name+"をBANしました");
      await systemPost(name+" がBANされました");
    };

    div.appendChild(nameText);
    div.appendChild(btn);
    userList.appendChild(div);
  });
};

/* 投稿表示 */
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  posts.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    if(isBanned(data.name) && data.name !== "[システム]") return;

    const id=d.id;

    const div = document.createElement("div");
    div.className = "comment";

    const nameEl = document.createElement("b");
    nameEl.textContent = data.name;

    const timeEl = document.createElement("div");
    timeEl.className = "time";
    timeEl.textContent = formatTime(data.time);

    const msgEl = document.createElement("div");
    msgEl.textContent = data.message;

    div.appendChild(nameEl);
    div.appendChild(timeEl);
    div.appendChild(msgEl);

    if(data.name !== "[システム]"){
      const likeText = document.createElement("span");
      likeText.textContent = `👍 ${data.likes?.length || 0}`;

      const likeBtn = document.createElement("button");
      likeBtn.textContent = data.likes?.includes(currentUser)
        ? "いいね解除"
        : "いいね";
      likeBtn.onclick = () => like(id);

      div.appendChild(likeText);
      div.appendChild(likeBtn);

      if(currentUser===data.name || currentUser===adminUser){
        const delBtn = document.createElement("button");
        delBtn.textContent = "削除";
        delBtn.onclick = () => del(id);
        div.appendChild(delBtn);
      }
    }

    posts.appendChild(div);
  });
});
</script>

</body>
</html>
