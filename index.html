<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Kosugi Maru', sans-serif; background:#f7f7f7; }

.topbar {
  background:#ffab19;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

#loginBox {
  display:none;
  position:absolute;
  top:50px;
  right:10px;
  background:white;
  padding:10px;
  border-radius:8px;
}

.container { max-width:600px; margin:20px auto; }

textarea {
  width:100%;
  height:100px;
}

.comment {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

.time {
  font-size:12px;
  color:gray;
}

#toast {
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px;
  opacity:0;
  transition:1s;
}

#adminPanel {
  display:none;
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px;
  border-radius:10px;
  width:300px;
  max-height:300px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="topbar">
  <b>雑談所</b>

  <div>
    <span id="userText"></span>

    <button id="loginBtn" onclick="toggleLogin()">サインイン/登録</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">ログアウト</button>
    <button id="adminBtn" onclick="openAdmin()" style="display:none;">管理者パネル</button>
  </div>
</div>

<div id="loginBox">
  <input id="username" placeholder="ユーザー名"><br>
  <input id="password" type="password" placeholder="パスワード"><br>
  <button onclick="login()">OK</button>
</div>

<div id="adminPanel">
  <b>管理者パネル</b>
  <div id="userList"></div>
</div>

<div class="container">

<textarea id="msg" maxlength="150" placeholder="メッセージを入力"></textarea>
<br>
<button onclick="post()">送信</button>

<div id="posts"></div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, deleteDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥 自分のFirebaseに変更 */
const firebaseConfig = {
  apiKey: "AIzaSyCAX28P2QGaNNp6xytLsE9hhcVher9TgPY",
  authDomain: "scratch-sns.firebaseapp.com",
  projectId: "scratch-sns",
  storageBucket: "scratch-sns.firebasestorage.app",
  messagingSenderId: "414045447005",
  appId: "1:414045447005:web:f4710d0a90a43745fcbeb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = localStorage.getItem("username");
const adminUser = "Hiromu0623";

/* UI更新 */
function updateUI(){
  const userText = document.getElementById("userText");
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const adminBtn = document.getElementById("adminBtn");
  const loginBox = document.getElementById("loginBox");

  if(currentUser){
    userText.textContent = currentUser;

    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline";
    loginBox.style.display = "none";

    if(currentUser === adminUser){
      adminBtn.style.display = "inline";
    }
  }else{
    userText.textContent = "";
    loginBtn.style.display = "inline";
    logoutBtn.style.display = "none";
    adminBtn.style.display = "none";
  }
}
updateUI();

/* ログインBOX */
window.toggleLogin = ()=>{
  const box=document.getElementById("loginBox");
  box.style.display = box.style.display==="none" ? "block" : "none";
};

/* 通知 */
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1500);
}

/* ログイン */
window.login = async ()=>{
  const name=username.value;
  const pass=password.value;

  if(!name||!pass){
    toast("入力してください。");
    return;
  }

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"users"),{username:name,password:pass});
    toast("登録しました。");
  }else{
    let ok=false;
    snap.forEach(d=>{
      if(d.data().password===pass) ok=true;
    });

    if(!ok){
      toast("パスワードが違います。");
      return;
    }

    toast("ログインしました。");
  }

  currentUser=name;
  localStorage.setItem("username",name);
  updateUI();
};

/* ログアウト */
window.logout = ()=>{
  localStorage.removeItem("username");
  location.reload();
};

/* 投稿 */
window.post = async ()=>{
  const text=msg.value;

  if(!currentUser){
    toast("サインインしてください。");
    return;
  }

  if(!text){
    toast("文字を入力してください。");
    return;
  }

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:text,
    time:Date.now(),
    likes:[]
  });

  msg.value="";
};

/* 時間 */
function formatTime(t){
  return new Date(t).toLocaleString();
}

/* いいね */
window.like = async(id)=>{
  const ref=doc(db,"posts",id);
  const snap=await getDoc(ref);

  let likes=snap.data().likes||[];

  if(likes.includes(currentUser)){
    likes=likes.filter(u=>u!==currentUser);
  }else{
    likes.push(currentUser);
  }

  await updateDoc(ref,{likes});
};

/* 削除 */
window.del = async(id)=>{
  await deleteDoc(doc(db,"posts",id));
};

/* 管理者パネル */
window.openAdmin = async ()=>{
  const panel = document.getElementById("adminPanel");
  const list = document.getElementById("userList");

  panel.style.display = panel.style.display==="none" ? "block" : "none";

  list.innerHTML="";

  const snap = await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const name = d.data().username;

    list.innerHTML += `
      <div>
        ${name}
        <button onclick="banUser('${name}')">BAN</button>
      </div>
    `;
  });
};

/* BAN */
window.banUser = async(name)=>{
  await addDoc(collection(db,"bans"),{
    username:name,
    perma:true
  });

  toast(name + "さんをBANしました。");
};

/* 表示 */
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  posts.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    const id=d.id;

    const liked=data.likes?.includes(currentUser);

    posts.innerHTML+=`
      <div class="comment">
        <b>${data.name}</b>
        <div class="time">${formatTime(data.time)}</div>
        ${data.message}<br>

        👍 ${data.likes?.length||0}
        <button onclick="like('${id}')">
          ${liked?"いいね解除":"いいね"}
        </button>

        ${(currentUser===data.name || currentUser===adminUser)
          ? `<button onclick="del('${id}')">削除</button>`
          : ""}
      </div>
    `;
  });
});
</script>

</body>
</html>
