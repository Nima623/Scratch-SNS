<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<style>
body { font-family:sans-serif; background:#f0f0f0; margin:0; }
.topbar { display:flex; justify-content:space-between; padding:10px; background:white; }

.container { max-width:600px; margin:20px auto; }

textarea {
  width:100%;
  height:80px;
  padding:10px;
  font-size:16px;
}

.box { background:white; padding:15px; border-radius:10px; }

.comment-box { background:white; padding:10px; margin-top:10px; border-radius:10px; }

button { margin-top:5px; cursor:pointer; }

.small { font-size:12px; color:gray; }

#toast {
  position:fixed;
  top:20px;
  right:20px;
  background:black;
  color:white;
  padding:10px;
  opacity:0;
  transition:1s;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>雑談所</h2>
  <div id="authArea"></div>
</div>

<div class="container">

<div class="box">
<textarea id="message" maxlength="150" placeholder="メッセージを入力"></textarea>
<div class="small" id="count">残り150文字</div>
<button onclick="post()">送信</button>
</div>

<div id="posts"></div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const app = initializeApp({
  apiKey:"AIzaSy...",
  authDomain:"scratch-sns.firebaseapp.com",
  projectId:"scratch-sns"
});

const db=getFirestore(app);
const auth=getAuth(app);

let user=null;

function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1000);
}

// 🔢 文字数
const msgBox=document.getElementById("message");
msgBox.addEventListener("input",()=>{
  const left=150-msgBox.value.length;
  document.getElementById("count").textContent="残り"+left+"文字";
});

// 投稿
window.post=async()=>{
  const msg=msgBox.value;
  if(!user){ toast("ログインして"); return;}
  if(!msg){ toast("入力して"); return;}

  await addDoc(collection(db,"posts"),{
    uid:user.uid,
    name:user.email,
    message:msg,
    likes:0,
    time:Date.now()
  });

  msgBox.value="";
  document.getElementById("count").textContent="残り150文字";
};

// 👍 いいね
window.like=async(id,likes)=>{
  await updateDoc(doc(db,"posts",id),{
    likes:likes+1
  });
};

// 🗑 削除
window.del=async(id)=>{
  await deleteDoc(doc(db,"posts",id));
};

// 表示
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  const div=document.getElementById("posts");
  div.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    const id=d.id;

    div.innerHTML+=`
      <div class="comment-box">
        <b>${data.name}</b><br>
        ${data.message}<br>
        👍 ${data.likes || 0}
        <button onclick="like('${id}',${data.likes||0})">いいね</button>
        ${user && user.uid===data.uid ? `<button onclick="del('${id}')">削除</button>`:""}
      </div>
    `;
  });
});

// ログイン状態
onAuthStateChanged(auth,u=>{
  user=u;
  document.getElementById("authArea").innerHTML = u
    ? `<button onclick="logout()">ログアウト</button>`
    : `<button onclick="login()">ログイン</button>`;
});

// ログイン簡易
window.login=async()=>{
  const name=prompt("ユーザー名");
  const pass=prompt("パス");
  await signInWithEmailAndPassword(auth,name+"@a.com",pass);
};

window.logout=()=>signOut(auth);
</script>

</body>
</html>
