<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Kosugi Maru', sans-serif; background:#f7f7f7; }

.topbar {
  background:#ffab19;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.container { max-width:600px; margin:20px auto; }

.comment {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

#toast {
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px;
  opacity:0;
  transition:1s;
}

#banScreen {
  display:none;
  text-align:center;
  padding:50px;
  font-size:18px;
}
</style>
</head>

<body>

<div id="banScreen"></div>

<div id="main">

<div class="topbar">
  <b>雑談所</b>
  <button onclick="toggleLogin()">サインイン/登録</button>
</div>

<div id="loginBox" style="display:none; padding:10px;">
  <input id="username" placeholder="ユーザー名">
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="login()">OK</button>
</div>

<div class="container">
<textarea id="msg"></textarea><br>
<button onclick="post()">送信</button>
<div id="posts"></div>
</div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCAX28P2QGaNNp6xytLsE9hhcVher9TgPY",
  authDomain: "scratch-sns.firebaseapp.com",
  projectId: "scratch-sns",
  storageBucket: "scratch-sns.firebasestorage.app",
  messagingSenderId: "414045447005",
  appId: "1:414045447005:web:f4710d0a90a43745fcbeb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = localStorage.getItem("username");
const adminUser = "Hiromu0623";

let warnings = JSON.parse(localStorage.getItem("warn")||"[]");
let banned = JSON.parse(localStorage.getItem("ban")||"null");

/* 通知 */
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1500);
}

/* 時間表示 */
function remain(ms){
  let m=Math.floor(ms/60000);
  let h=Math.floor(m/60);
  m%=60;
  if(h>0 && m>0) return h+"時間"+m+"分";
  if(h>0) return h+"時間";
  return m+"分";
}

/* バンチェック */
function checkBan(){
  if(!banned) return false;

  if(banned.perma){
    showBan("あなたは永久バンされました。");
    return true;
  }

  const left=banned.until-Date.now();
  if(left<=0){
    banned=null;
    localStorage.removeItem("ban");
    return false;
  }

  showBan(`あなたは${remain(left)}間バンされています。`);
  return true;
}

function showBan(text){
  document.getElementById("main").style.display="none";
  const b=document.getElementById("banScreen");
  b.style.display="block";
  b.innerText=text;
}

/* NGワード */
const ng=["死ね","バカ","エロ","キモい","うざい"];

function addWarn(){
  const now=Date.now();
  warnings.push(now);
  localStorage.setItem("warn",JSON.stringify(warnings));

  /* 1時間6回 */
  const last1h=warnings.filter(t=>now-t<3600000);
  if(last1h.length>=6){
    ban(3600000);
  }

  /* 1時間15回 */
  if(last1h.length>=15){
    ban(86400000);
  }

  /* 10分25回 */
  const last10=warnings.filter(t=>now-t<600000);
  if(last10.length>=25){
    ban(0,true);
  }
}

function ban(time,perma=false){
  banned={
    until:Date.now()+time,
    perma:perma
  };
  localStorage.setItem("ban",JSON.stringify(banned));
  checkBan();
}

/* ログイン */
window.login=async()=>{
  const name=username.value;
  const pass=password.value;

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"users"),{username:name,password:pass});
    systemMsg(name+"さんが新しく参加しました！");
  }

  currentUser=name;
  localStorage.setItem("username",name);
  toast("ログインしました。");
};

/* 投稿 */
window.post=async()=>{
  if(checkBan()) return;

  const text=msg.value;

  if(!text){ toast("文字を入力してください。"); return;}

  if(ng.some(w=>text.includes(w))){
    toast("不快な文字を検知しました。");
    addWarn();
    return;
  }

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:text,
    time:Date.now(),
    likes:[]
  });

  msg.value="";
};

/* システムメッセージ */
async function systemMsg(text){
  await addDoc(collection(db,"posts"),{
    name:"システム",
    message:text,
    system:true,
    time:Date.now()
  });
}

/* 表示 */
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  posts.innerHTML="";
  snap.forEach(d=>{
    const data=d.data();

    posts.innerHTML+=`
      <div class="comment">
        <b>${data.name}</b><br>
        ${data.message}
      </div>
    `;
  });
});

checkBan();
</script>

</body>
</html>
