<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Kosugi Maru', sans-serif;
  background:#f7f7f7;
}

.topbar {
  background:#ffab19;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  cursor:pointer;
}

.sendBtn {
  padding:10px 18px;
  font-size:15px;
}

#loginBox {
  display:none;
  position:absolute;
  top:60px;
  right:10px;
  background:white;
  padding:15px;
  border-radius:10px;
  width:180px;
  flex-direction:column;
  gap:8px;
}

.container {
  max-width:600px;
  margin:20px auto;
}

textarea {
  width:100%;
  height:100px;
}

.comment {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  white-space: pre-wrap;
}

.time {
  font-size:12px;
  color:gray;
}

/* 👍 少しだけ右にする */
.likeArea {
  margin-top:5px;
}

.likeBtn {
  margin-left:10px;
}

/* 通知 */
#toast {
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px;
  border-radius:8px;
  opacity:0;
  transition:0.5s;
}
</style>
</head>

<body>

<div class="topbar">
  <b>雑談所</b>
  <div>
    <span id="userText"></span>

    <button id="loginBtn" onclick="toggleLogin()">サインイン/登録</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">ログアウト</button>
  </div>
</div>

<div id="loginBox">
  <input id="username" placeholder="ユーザー名">
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="login()">OK</button>
</div>

<div class="container">
<textarea id="msg" placeholder="メッセージ"></textarea><br>
<button class="sendBtn" onclick="post()">送信</button>
<div id="posts"></div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({ projectId:"scratch-sns" });
const db = getFirestore(app);

let currentUser = localStorage.getItem("username");

/* UI */
function updateUI(){
  userText.textContent = currentUser || "";
  loginBtn.style.display = currentUser ? "none" : "inline";
  logoutBtn.style.display = currentUser ? "inline" : "none";
  loginBox.style.display = "none";
}
updateUI();

window.toggleLogin = ()=>{
  loginBox.style.display = loginBox.style.display==="none"?"block":"none";
};

/* 通知 */
function toastMsg(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1500);
}

/* ハッシュ */
async function hash(pass){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pass));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

/* 🔥 ログイン修正 */
window.login = async ()=>{
  const name=username.value;
  const pass=password.value;

  if(!name || !pass){
    toastMsg("入力してください");
    return;
  }

  const hashed = await hash(pass); // ← 1回だけ

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"users"),{
      username:name,
      password:hashed
    });
    toastMsg("登録しました");
    currentUser=name;
  }else{
    let ok=false;

    for(const d of snap.docs){
      const saved=d.data().password;

      if(saved === hashed){ // ← これだけでOK
        ok=true;
      }
    }

    if(!ok){
      toastMsg("パスワードが違います");
      return;
    }

    toastMsg("ログインしました");
    currentUser=name;
  }

  localStorage.setItem("username",name);
  updateUI();
};

/* ログアウト */
window.logout = ()=>{
  localStorage.clear();
  currentUser=null;
  updateUI();
  toastMsg("ログアウトしました");
};

/* 投稿 */
window.post = async ()=>{
  if(!currentUser){
    toastMsg("ログインしてください");
    return;
  }

  if(!msg.value){
    toastMsg("文字を入力してください");
    return;
  }

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:msg.value,
    time:Date.now(),
    likes:[]
  });

  msg.value="";
};

/* 時間 */
function formatTime(t){
  return new Date(t).toLocaleString();
}

/* いいね */
window.like = async(id)=>{
  const ref=doc(db,"posts",id);
  const snap=await getDoc(ref);

  let likes=snap.data().likes||[];

  if(likes.includes(currentUser)){
    likes=likes.filter(u=>u!==currentUser);
  }else{
    likes.push(currentUser);
  }

  await updateDoc(ref,{likes});
};

/* 表示 */
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  posts.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    const id=d.id;

    const div=document.createElement("div");
    div.className="comment";

    const name=document.createElement("b");
    name.textContent=data.name;

    const time=document.createElement("div");
    time.className="time";
    time.textContent=formatTime(data.time);

    const msgEl=document.createElement("div");
    msgEl.textContent=data.message;

    const likeArea=document.createElement("div");
    likeArea.className="likeArea";

    const likeText=document.createElement("span");
    likeText.textContent="👍 "+(data.likes?.length||0);

    const likeBtn=document.createElement("button");
    likeBtn.className="likeBtn";
    likeBtn.textContent=data.likes?.includes(currentUser)?"いいね解除":"いいね";
    likeBtn.onclick=()=>like(id);

    likeArea.appendChild(likeText);
    likeArea.appendChild(likeBtn);

    div.appendChild(name);
    div.appendChild(time);
    div.appendChild(msgEl);
    div.appendChild(likeArea);

    posts.appendChild(div);
  });
});
</script>

</body>
</html>
