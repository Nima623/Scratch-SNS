<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Kosugi Maru', sans-serif;
  background:#f7f7f7;
}

.topbar {
  background:#ffab19;
  padding:10px;
  display:flex;
  justify-content:space-between;
}

.container {
  max-width:600px;
  margin:20px auto;
}

textarea {
  width:100%;
  height:80px;
}

.comment {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
}

#toast {
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px;
  opacity:0;
  transition:1s;
}

.small-box input {
  width:90px;
}
</style>
</head>

<body>

<div class="topbar">
  <b>雑談所</b>

  <div id="userArea" class="small-box">
    <input id="username" placeholder="ユーザー名">
    <input id="password" type="password" placeholder="パスワード">
    <button onclick="login()">登録/ログイン</button>
  </div>
</div>

<div class="container">

<textarea id="msg" maxlength="150" placeholder="メッセージを入力"></textarea>
<br>
<button onclick="post()">送信</button>

<div id="posts"></div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, deleteDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥 自分のfirebaseConfigに変更 */
const firebaseConfig = {
  apiKey: "AIzaSyCAX28P2QGaNNp6xytLsE9hhcVher9TgPY",
  authDomain: "scratch-sns.firebaseapp.com",
  projectId: "scratch-sns",
  storageBucket: "scratch-sns.firebasestorage.app",
  messagingSenderId: "414045447005",
  appId: "1:414045447005:web:f4710d0a90a43745fcbeb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = localStorage.getItem("username") || null;

/* 管理者 */
const adminUser = "Hiromu0623";

/* 通知 */
function toast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.style.opacity=1;
  setTimeout(()=>t.style.opacity=0,1000);
}

/* NGワード */
const ngWords = ["死ね","バカ","キモい","エロ","うざい"];
function checkNG(text){
  return ngWords.some(w=>text.includes(w));
}

/* ログイン */
window.login = async ()=>{
  const name=document.getElementById("username").value;
  const pass=document.getElementById("password").value;

  if(!name||!pass){
    toast("ユーザー名とパスワードを入力してください。");
    return;
  }

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"users"),{
      username:name,
      password:pass
    });
    toast("アカウントを登録しました。");
  }else{
    let ok=false;
    snap.forEach(d=>{
      if(d.data().password===pass) ok=true;
    });

    if(!ok){
      toast("パスワードが違います。");
      return;
    }

    toast("ログインしました。");
  }

  currentUser=name;
  localStorage.setItem("username",name);
  updateUI();
};

/* UI */
function updateUI(){
  const area=document.getElementById("userArea");

  if(currentUser){
    area.innerHTML=`
      ${currentUser}
      <button onclick="logout()">ログアウト</button>
    `;
  }
}
updateUI();

/* ログアウト */
window.logout=()=>{
  localStorage.removeItem("username");
  location.reload();
};

/* 投稿 */
window.post=async ()=>{
  const msg=document.getElementById("msg").value;

  if(!currentUser){
    toast("サインインしてください。");
    return;
  }

  if(!msg){
    toast("文字を入力してください。");
    return;
  }

  if(checkNG(msg)){
    toast("不快な文字を検知しました。");
    return;
  }

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:msg,
    likes:[],
    time:Date.now()
  });

  document.getElementById("msg").value="";
};

/* いいね */
window.like=async(id,likes)=>{
  if(!currentUser){
    toast("サインインしてください。");
    return;
  }

  let newLikes=likes||[];

  if(newLikes.includes(currentUser)){
    newLikes=newLikes.filter(u=>u!==currentUser);
  }else{
    newLikes.push(currentUser);
  }

  await updateDoc(doc(db,"posts",id),{
    likes:newLikes
  });
};

/* 削除 */
window.del=async(id)=>{
  await deleteDoc(doc(db,"posts",id));
};

/* 表示 */
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  const div=document.getElementById("posts");
  div.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    const id=d.id;

    const liked=data.likes?.includes(currentUser);

    div.innerHTML+=`
      <div class="comment">
        <b>${data.name}</b><br>
        ${data.message}<br>

        👍 ${data.likes?.length||0}
        <button onclick="like('${id}',${JSON.stringify(data.likes||[])})">
          ${liked?"いいね解除":"いいね"}
        </button>

        ${
          currentUser===data.name || currentUser===adminUser
          ? `<button onclick="del('${id}')">削除</button>`
          : ""
        }
      </div>
    `;
  });
});
</script>

</body>
</html>
