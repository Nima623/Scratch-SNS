<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:'Kosugi Maru', sans-serif; background:#f7f7f7; }
.topbar { background:#ffab19; padding:10px; display:flex; justify-content:space-between; }
button { cursor:pointer; padding:6px 10px; font-size:14px; }

/* ⭐ ログインBOX改善 */
#loginBox {
  display:none;
  position:absolute;
  top:60px;
  right:10px;
  background:white;
  padding:15px;
  border-radius:10px;
  width:220px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

#loginBox label{
  font-size:13px;
}

#loginBox input{
  padding:6px;
  font-size:14px;
}

#adminPanel {
  display:none;
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px;
  border-radius:10px;
  width:300px;
}

.container { max-width:600px; margin:20px auto; }
textarea { width:100%; height:100px; }

.comment {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  white-space: pre-wrap;
}

.time { font-size:12px; color:gray; }

#toast {
  position:fixed; top:100px; left:50%;
  transform:translateX(-50%);
  background:black; color:white; padding:10px;
  border-radius:8px; opacity:0; transition:0.5s;
}

.likeBtn { margin-left:8px; }
.delBtn { margin-left:8px; }

.banScreen{
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
}
</style>
</head>

<body>

<div class="topbar">
  <b>雑談所</b>
  <div>
    <span id="userText"></span>
    <button id="loginBtn" onclick="toggleLogin()">サインイン/登録</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">ログアウト</button>
    <button id="adminBtn" onclick="openAdmin()" style="display:none;">管理者メニュー</button>
  </div>
</div>

<!-- ⭐ ログインBOX -->
<div id="loginBox">
  <label>ユーザー名</label>
  <input id="username" placeholder="ここにはユーザー名を入力">

  <label>パスワード</label>
  <input id="password" type="password" placeholder="ここにはパスワードを入力">

  <button onclick="login()">OK</button>
</div>

<div id="adminPanel">
  <b>管理者メニュー</b>
  <div id="userList"></div>
</div>

<div class="container">
<textarea id="msg" maxlength="150"></textarea><br>
<button onclick="post()">送信</button>
<div id="posts"></div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, deleteDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({ projectId:"scratch-sns" });
const db = getFirestore(app);

let currentUser = localStorage.getItem("username");
const adminUser = "Hiromu0623";

/* BAN */
let bannedUsers = [];
onSnapshot(collection(db,"bans"), snap=>{
  bannedUsers = snap.docs.map(d=>({id:d.id,...d.data()}));
  checkMyBan();
});

function isBanned(name){
  return bannedUsers.some(b=>b.username===name);
}

function showBanScreen(text){
  document.body.innerHTML = `<div class="banScreen">${text}</div>`;
}

function checkMyBan(){
  if(!currentUser) return;
  const b = bannedUsers.find(b=>b.username===currentUser);
  if(b) showBanScreen("あなたは管理者によってバンされました。");
}

/* UI */
function updateUI(){
  userText.textContent=currentUser||"";
  loginBtn.style.display=currentUser?"none":"inline";
  logoutBtn.style.display=currentUser?"inline":"none";
  adminBtn.style.display=currentUser===adminUser?"inline":"none";
  loginBox.style.display="none";
}
updateUI();

/* ⭐ 修正：確実に開くように */
window.toggleLogin=()=>{
  if(loginBox.style.display==="none" || loginBox.style.display===""){
    loginBox.style.display="flex";
  }else{
    loginBox.style.display="none";
  }
};

function toastMsg(msg){
  toast.textContent=msg;
  toast.style.opacity=1;
  setTimeout(()=>toast.style.opacity=0,1500);
}

/* ハッシュ */
async function hash(pass){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pass));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

/* ログイン */
window.login=async ()=>{
  const name=username.value;
  const pass=password.value;

  if(!name || !pass){
    toastMsg("入力してください");
    return;
  }

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"users"),{
      username:name,
      password:await hash(pass)
    });
    toastMsg("登録しました");
    currentUser=name;
  }else{
    let ok=false;

    for(const d of snap.docs){
      if(d.data().password === await hash(pass)){
        ok=true;
      }
    }

    if(!ok){
      toastMsg("パスワードが違います");
      return;
    }

    toastMsg("ログインしました");
    currentUser=name;
  }

  localStorage.setItem("username",name);
  updateUI();
  checkMyBan();
};

window.logout=()=>{
  localStorage.clear();
  currentUser=null;
  updateUI();
  toastMsg("ログアウトしました");
};

/* 投稿 */
window.post=async ()=>{
  if(!currentUser) return toastMsg("ログインしてください");
  if(isBanned(currentUser)) return;

  if(!msg.value){
    toastMsg("文字を入力してください");
    return;
  }

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:msg.value,
    time:Date.now(),
    likes:[]
  });

  msg.value="";
};

/* 管理者メニュー（←修正ここ） */
window.openAdmin=async ()=>{
  if(adminPanel.style.display==="none" || adminPanel.style.display===""){
    adminPanel.style.display="block";
  }else{
    adminPanel.style.display="none";
  }

  userList.innerHTML="";

  const snap=await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const name=d.data().username;
    const div=document.createElement("div");

    div.textContent=name;
    userList.appendChild(div);
  });
};
</script>

</body>
</html>
