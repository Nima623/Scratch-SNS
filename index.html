<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Kosugi Maru', sans-serif;
  background:#f7f7f7;
}

/* 上バー（Scratch風） */
.topbar {
  background:#ffab19;
  padding:10px 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* ボタン共通 */
button {
  cursor:pointer;
}

/* ログインボックス */
#loginBox {
  display:none;
  position:absolute;
  top:60px;
  right:10px;
  background:white;
  padding:15px;
  border-radius:10px;
  width:180px;

  display:flex;
  flex-direction:column;
  gap:8px;

  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

#loginBox input {
  width:100%;
  padding:6px;
  border:1px solid #ccc;
  border-radius:5px;
}

#loginBox button {
  padding:6px;
  background:#ffab19;
  border:none;
  border-radius:5px;
}

/* メイン */
.container {
  max-width:650px;
  margin:20px auto;
}

/* 投稿ボックス */
.post-box {
  background:white;
  padding:10px;
  border-radius:10px;
  box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

textarea {
  width:100%;
  height:100px;
  padding:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

/* 投稿 */
.comment {
  background:white;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  box-shadow:0 1px 4px rgba(0,0,0,0.1);
}

.time {
  font-size:12px;
  color:gray;
}

/* 通知 */
#toast {
  position:fixed;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:10px;
  opacity:0;
  transition:1s;
}

/* 管理者パネル */
#adminPanel {
  display:none;
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px;
  border-radius:10px;
  width:300px;
  max-height:300px;
  overflow:auto;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<div class="topbar">
  <b>雑談所</b>

  <div>
    <span id="userText"></span>

    <button id="loginBtn" onclick="toggleLogin()">サインイン/登録</button>
    <button id="logoutBtn" onclick="logout()" style="display:none;">ログアウト</button>
    <button id="adminBtn" onclick="openAdmin()" style="display:none;">管理者パネル</button>
  </div>
</div>

<!-- ログイン -->
<div id="loginBox">
  <input id="username" placeholder="ユーザー名">
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="login()">OK</button>
</div>

<!-- 管理者 -->
<div id="adminPanel">
  <b>管理者パネル</b>
  <div id="userList"></div>
</div>

<div class="container">

<div class="post-box">
<textarea id="msg" maxlength="150" placeholder="メッセージを入力"></textarea>
<br>
<button onclick="post()">送信</button>
</div>

<div id="posts"></div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, deleteDoc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

/* 🔥ここを自分のに変更 */
const firebaseConfig = {
  apiKey: "AIzaSyCAX28P2QGaNNp6xytLsE9hhcVher9TgPY",
  authDomain: "scratch-sns.firebaseapp.com",
  projectId: "scratch-sns",
  storageBucket: "scratch-sns.firebasestorage.app",
  messagingSenderId: "414045447005",
  appId: "1:414045447005:web:f4710d0a90a43745fcbeb4"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = localStorage.getItem("username");
const adminUser = "Hiromu0623";

/* UI */
function updateUI(){
  userText.textContent = currentUser || "";
  loginBtn.style.display = currentUser ? "none" : "inline";
  logoutBtn.style.display = currentUser ? "inline" : "none";
  adminBtn.style.display = currentUser===adminUser ? "inline" : "none";
  loginBox.style.display = "none";
}
updateUI();

/* ログイン表示 */
window.toggleLogin = ()=>{
  loginBox.style.display = loginBox.style.display==="none"?"block":"none";
};

/* 通知 */
function toast(msg){
  toast.innerText = msg;
}

/* ログイン */
window.login = async ()=>{
  const name=username.value;
  const pass=password.value;

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"users"),{username:name,password:pass});
  }

  currentUser=name;
  localStorage.setItem("username",name);
  updateUI();
};

/* ログアウト */
window.logout=()=>{
  localStorage.removeItem("username");
  location.reload();
};

/* 投稿 */
window.post=async()=>{
  if(!currentUser){ alert("サインインしてください"); return; }
  if(!msg.value){ return; }

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:msg.value,
    time:Date.now(),
    likes:[]
  });

  msg.value="";
};

/* 時間 */
function formatTime(t){
  return new Date(t).toLocaleString();
}

/* いいね */
window.like=async(id)=>{
  const ref=doc(db,"posts",id);
  const snap=await getDoc(ref);
  let likes=snap.data().likes||[];

  if(likes.includes(currentUser)){
    likes=likes.filter(u=>u!==currentUser);
  }else{
    likes.push(currentUser);
  }

  await updateDoc(ref,{likes});
};

/* 削除 */
window.del=async(id)=>{
  await deleteDoc(doc(db,"posts",id));
};

/* 管理者 */
window.openAdmin=async()=>{
  adminPanel.style.display = adminPanel.style.display==="none"?"block":"none";
  userList.innerHTML="";

  const snap=await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const name=d.data().username;

    userList.innerHTML+=`
      <div>
        ${name}
        <button onclick="banUser('${name}')">BAN</button>
      </div>
    `;
  });
};

/* BAN */
window.banUser=async(name)=>{
  await addDoc(collection(db,"bans"),{username:name});
};

/* 表示 */
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  posts.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();
    const id=d.id;
    const liked=data.likes?.includes(currentUser);

    posts.innerHTML+=`
      <div class="comment">
        <b>${data.name}</b>
        <div class="time">${formatTime(data.time)}</div>
        ${data.message}<br>

        👍 ${data.likes?.length||0}
        <button onclick="like('${id}')">${liked?"いいね解除":"いいね"}</button>

        ${(currentUser===data.name || currentUser===adminUser)
          ? `<button onclick="del('${id}')">削除</button>`:""}
      </div>
    `;
  });
});
</script>

</body>
</html>
