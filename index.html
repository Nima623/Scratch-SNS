<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<style>
body {
  font-family: 'Kosugi Maru', sans-serif;
  background: #f9f9f9;
  margin: 20px;
}

.topbar {
  display: flex;
  justify-content: space-between;
}

.auth-buttons button {
  margin-left: 5px;
}

.container {
  max-width: 600px;
  margin: auto;
}

textarea {
  width: 100%;
  height: 60px;
  padding: 8px;
}

button {
  padding: 6px 10px;
  cursor: pointer;
}

.comment-box {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 10px;
}

.name {
  font-weight: bold;
}

.time {
  color: gray;
  font-size: 12px;
}

/* 通知 */
#toast {
  position: fixed;
  top: 20px;
  right: 20px;
  background: black;
  color: white;
  padding: 10px;
  border-radius: 5px;
  opacity: 0;
  transition: 1s;
}
</style>
</head>

<body>

<div class="topbar">
  <h2>雑談所</h2>
  <div class="auth-buttons">
    <button onclick="register()">アカウント登録</button>
    <button onclick="login()">サインイン</button>
  </div>
</div>

<div class="container">

<textarea id="message" placeholder="メッセージを入力"></textarea><br>
<button onclick="post()">送信</button>

<div id="posts"></div>

</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { 
  getFirestore, collection, addDoc, query, orderBy, onSnapshot 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

import { 
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCAX28P2QGaNNp6xytLsE9hhcVher9TgPY",
  authDomain: "scratch-sns.firebaseapp.com",
  projectId: "scratch-sns"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentUser = null;

// 🔔 トースト
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.opacity = "1";
  setTimeout(() => {
    t.style.opacity = "0";
  }, 1000);
}

// 🔐 登録
window.register = async function() {
  const email = prompt("ユーザー名（メール形式）");
  const pass = prompt("パスワード");

  if (!email || !pass) return;

  try {
    await createUserWithEmailAndPassword(auth, email, pass);
    showToast("登録成功！");
  } catch (e) {
    showToast("登録失敗");
  }
}

// 🔑 ログイン
window.login = async function() {
  const email = prompt("ユーザー名");
  const pass = prompt("パスワード");

  if (!email || !pass) return;

  try {
    await signInWithEmailAndPassword(auth, email, pass);
    showToast("ログイン成功！");
  } catch {
    showToast("ログイン失敗");
  }
}

// 🔄 ログイン状態維持
onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

// 投稿
window.post = async function() {
  const message = document.getElementById("message").value;

  if (!currentUser) {
    showToast("ログインして！");
    return;
  }

  if (!message) {
    showToast("メッセージを入力して！");
    return;
  }

  await addDoc(collection(db, "posts"), {
    name: currentUser.email,
    message: message,
    time: Date.now()
  });

  document.getElementById("message").value = "";
}

// 表示
function formatTime(ms) {
  return new Date(ms).toLocaleString();
}

const q = query(collection(db, "posts"), orderBy("time", "desc"));

onSnapshot(q, (snapshot) => {
  const postsDiv = document.getElementById("posts");
  postsDiv.innerHTML = "";

  snapshot.forEach((doc) => {
    const d = doc.data();
    postsDiv.innerHTML += `
      <div class="comment-box">
        <div class="name">${d.name}</div>
        <div>${d.message}</div>
        <div class="time">${formatTime(d.time)}</div>
      </div>
    `;
  });
});
</script>

</body>
</html>
