<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Scratch雑談SNS</title>

<link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Kosugi Maru', sans-serif;
  background:#f7f7f7;
}

.topbar {
  background:#ffab19;
  padding:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button {
  cursor:pointer;
}

/* 元のUIに戻す */
#loginBox {
  display:none;
  position:absolute;
  top:60px;
  right:10px;
  background:white;
  padding:15px;
  border-radius:10px;
  width:180px;
  display:flex;
  flex-direction:column;
  gap:8px;
}

#adminPanel {
  display:none;
  position:fixed;
  top:100px;
  left:50%;
  transform:translateX(-50%);
  background:white;
  padding:15px;
  border-radius:10px;
  width:300px;
}

.container {
  max-width:600px;
  margin:20px auto;
}

textarea {
  width:100%;
  height:100px;
}

.comment {
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  white-space: pre-wrap;
}

#banScreen {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:white;
  justify-content:center;
  align-items:center;
  font-size:20px;
  text-align:center;
  z-index:9999;
}
</style>
</head>

<body>

<div id="banScreen"></div>

<div class="topbar">
  <b>雑談所</b>
  <div>
    <span id="userText"></span>
    <button onclick="toggleLogin()">サインイン/登録</button>
    <button onclick="logout()">ログアウト</button>
    <button onclick="openAdmin()">管理者メニュー</button>
  </div>
</div>

<div id="loginBox">
  <input id="username" placeholder="ユーザー名">
  <input id="password" type="password" placeholder="パスワード">
  <button onclick="login()">OK</button>
</div>

<div id="adminPanel">
  <b>管理者メニュー</b>
  <div id="userList"></div>
</div>

<div class="container">
<textarea id="msg"></textarea><br>
<button onclick="post()">送信</button>
<div id="posts"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import {
  getFirestore, collection, addDoc, query, where, getDocs,
  onSnapshot, orderBy, updateDoc, doc, getDoc
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const app = initializeApp({ projectId:"scratch-sns" });
const db = getFirestore(app);

let currentUser = localStorage.getItem("username");
const adminUser = "Hiromu0623";

/* UI */
function updateUI(){
  userText.textContent=currentUser||"";
}
updateUI();

window.toggleLogin=()=>{
  loginBox.style.display = loginBox.style.display==="none"?"block":"none";
};

/* ハッシュ */
async function hash(pass){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pass));
  return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

/* システム投稿 */
async function systemPost(text){
  await addDoc(collection(db,"posts"),{
    name:"[システム]",
    message:text,
    time:Date.now(),
    likes:[]
  });
}

/* ログイン */
window.login=async ()=>{
  const name=username.value;
  const pass=password.value;

  const q=query(collection(db,"users"),where("username","==",name));
  const snap=await getDocs(q);

  if(snap.empty){
    await addDoc(collection(db,"users"),{username:name,password:await hash(pass)});
    await systemPost(name+" が参加しました");
    currentUser=name;
  }else{
    let ok=false;
    for(const d of snap.docs){
      if(d.data().password === pass || d.data().password === await hash(pass)){
        ok=true;
      }
    }
    if(!ok){ alert("パスワードが違います"); return; }
    currentUser=name;
  }

  localStorage.setItem("username",name);
  updateUI();
};

window.logout=()=>{
  localStorage.clear();
  location.reload();
};

/* BAN */
let bannedUsers=[];
onSnapshot(collection(db,"bans"), snap=>{
  bannedUsers = snap.docs.map(d=>d.data());

  const me = bannedUsers.find(b=>b.username===currentUser);
  if(me) showBan(me);
});

function showBan(b){
  banScreen.style.display="flex";
  banScreen.innerHTML="あなたは管理者によってバンされました。";
}

/* 投稿 */
window.post=async ()=>{
  if(!currentUser) return;

  await addDoc(collection(db,"posts"),{
    name:currentUser,
    message:msg.value,
    time:Date.now(),
    likes:[]
  });

  msg.value="";
};

/* いいね */
window.like=async(id)=>{
  const ref=doc(db,"posts",id);
  const snap=await getDoc(ref);

  let likes=snap.data().likes||[];

  if(likes.includes(currentUser)){
    likes=likes.filter(u=>u!==currentUser);
  }else{
    likes.push(currentUser);
  }

  await updateDoc(ref,{likes});
};

/* 管理者 */
window.openAdmin=async ()=>{
  adminPanel.style.display = adminPanel.style.display==="none"?"block":"none";
  userList.innerHTML="";

  const snap=await getDocs(collection(db,"users"));

  snap.forEach(d=>{
    const name=d.data().username;

    const div=document.createElement("div");
    div.textContent=name;

    const btn=document.createElement("button");
    btn.textContent="BAN";

    btn.onclick=async ()=>{
      await addDoc(collection(db,"bans"),{
        username:name,
        permanent:true
      });

      await systemPost(name+"さんがバンされました");
    };

    div.appendChild(btn);
    userList.appendChild(div);
  });
};

/* 表示 */
onSnapshot(query(collection(db,"posts"),orderBy("time","desc")),snap=>{
  posts.innerHTML="";

  snap.forEach(d=>{
    const data=d.data();

    const div=document.createElement("div");
    div.className="comment";

    div.textContent=data.name+" : "+data.message;

    if(data.name!=="[システム]"){
      const btn=document.createElement("button");
      btn.textContent="いいね";
      btn.onclick=()=>like(d.id);
      div.appendChild(btn);
    }

    posts.appendChild(div);
  });
});
</script>

</body>
</html>
